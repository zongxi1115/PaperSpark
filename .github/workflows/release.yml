name: Release

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Branch or tag to release from
        required: true
        default: master
      source_pr:
        description: Source PR number for traceability
        required: false
        default: ''
      existing_tag:
        description: Rebuild an existing tag/release, e.g. v1.1.0
        required: false
        default: ''
      recreate_release:
        description: Recreate or refresh the GitHub Release for existing_tag
        required: false
        default: 'false'

concurrency:
  group: master-versioning
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.existing.outputs.released || steps.semantic.outputs.released }}
      version: ${{ steps.existing.outputs.version || steps.semantic.outputs.version }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Show release context
        run: |
          echo "release_ref=${{ github.event.inputs.release_ref }}"
          echo "source_pr=${{ github.event.inputs.source_pr }}"
          echo "existing_tag=${{ github.event.inputs.existing_tag }}"
          echo "recreate_release=${{ github.event.inputs.recreate_release }}"

      - name: Reuse existing tag
        id: existing
        if: ${{ github.event.inputs.existing_tag != '' }}
        shell: bash
        run: |
          TAG="${{ github.event.inputs.existing_tag }}"
          VERSION="${TAG#v}"
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using existing tag ${TAG}"

      - name: Recreate or refresh GitHub Release
        if: ${{ github.event.inputs.existing_tag != '' && github.event.inputs.recreate_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.event.inputs.existing_tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --latest
          else
            gh release create "$TAG" --verify-tag --generate-notes --latest
          fi

      - name: Release
        id: semantic
        if: ${{ github.event.inputs.existing_tag == '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEFORE_TAG="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"

          npx semantic-release

          AFTER_TAG="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"

          if [ -n "$AFTER_TAG" ] && [ "$AFTER_TAG" != "$BEFORE_TAG" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=${AFTER_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  build-electron-windows:
    name: Build Electron Windows Assets
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.release.outputs.version }}
      RELEASE_TAG: v${{ needs.release.outputs.version }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ needs.release.outputs.version }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next standalone bundle
        run: pnpm build

      - name: Prepare Electron bundle resources
        run: pnpm desktop:build

      - name: Build Electron unpacked app
        run: pnpm exec electron-builder --win --x64 --dir

      - name: Prune Windows packaging paths
        shell: pwsh
        run: node scripts/prune-electron-win-assets.mjs

      - name: Build Electron installer
        run: pnpm exec electron-builder --win nsis --x64 --publish never --prepackaged release/electron/win-unpacked

      - name: Archive win-unpacked
        shell: pwsh
        run: |
          $zipPath = "release/electron/PaperSpark-${env:RELEASE_VERSION}-win-unpacked.zip"
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }
          Compress-Archive -Path "release/electron/win-unpacked/*" -DestinationPath $zipPath

      - name: Verify release assets
        shell: pwsh
        run: |
          Get-ChildItem release/electron -Force | Format-Table Name,Length,LastWriteTime -AutoSize
          $required = @(
            "release/electron/PaperSpark-${env:RELEASE_VERSION}-setup.exe",
            "release/electron/PaperSpark-${env:RELEASE_VERSION}-win-unpacked.zip"
          )
          foreach ($item in $required) {
            if (-not (Test-Path $item)) {
              throw "Missing expected asset: $item"
            }
          }

      - name: Upload assets to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $releaseVersion = "${{ needs.release.outputs.version }}"
          $releaseTag = "v$releaseVersion"
          $assets = @(
            "release/electron/PaperSpark-${releaseVersion}-setup.exe",
            "release/electron/PaperSpark-${releaseVersion}-win-unpacked.zip"
          )
          $nsisArchive = Get-ChildItem "release/electron" -Filter "*.nsis.7z" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsisArchive) {
            $assets += $nsisArchive.FullName
          }

          gh release upload $releaseTag $assets --clobber

  build-electron-macos:
    name: Build Electron macOS Assets
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: macos-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.release.outputs.version }}
      RELEASE_TAG: v${{ needs.release.outputs.version }}
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ needs.release.outputs.version }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next standalone bundle
        run: pnpm build

      - name: Prepare Electron bundle resources
        run: pnpm desktop:build

      - name: Build Electron macOS packages
        run: pnpm exec electron-builder --mac dmg zip --publish never

      - name: Verify macOS release assets
        run: |
          ls -lah release/electron
          test -f "release/electron/PaperSpark-${RELEASE_VERSION}-mac-arm64.dmg" || test -f "release/electron/PaperSpark-${RELEASE_VERSION}-mac-x64.dmg" || test -f "release/electron/PaperSpark-${RELEASE_VERSION}-mac-universal.dmg"

      - name: Upload macOS assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${RELEASE_TAG}" release/electron/*.dmg release/electron/*-mac-*.zip --clobber

  deploy-production:
    name: Deploy to Vercel
    needs:
      - release
      - build-electron-windows
      - build-electron-macos
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ needs.release.outputs.version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy Production to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
