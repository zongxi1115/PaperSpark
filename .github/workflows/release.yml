name: Release
on:
  pull_request:
    types:
      - closed
    branches:
      - master

concurrency:
  group: master-versioning
  cancel-in-progress: false

jobs:
  release:
    # 只在 PR 被 merge 且带有 release label 时运行
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEFORE_TAG="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"

          npx semantic-release

          AFTER_TAG="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"

          if [ -n "$AFTER_TAG" ] && [ "$AFTER_TAG" != "$BEFORE_TAG" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=${AFTER_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  build-electron-windows:
    name: Build Electron Windows Assets
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.release.outputs.version }}
      RELEASE_TAG: v${{ needs.release.outputs.version }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ needs.release.outputs.version }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next standalone bundle
        run: pnpm build

      - name: Prepare Electron bundle resources
        run: pnpm desktop:build

      - name: Build Electron installer
        run: pnpm exec electron-builder --win nsis --x64

      - name: Archive win-unpacked
        shell: pwsh
        run: |
          $zipPath = "release/electron/PaperSpark-${env:RELEASE_VERSION}-win-unpacked.zip"
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }
          Compress-Archive -Path "release/electron/win-unpacked/*" -DestinationPath $zipPath

      - name: Verify release assets
        shell: pwsh
        run: |
          Get-ChildItem release/electron -Force | Format-Table Name,Length,LastWriteTime -AutoSize
          $required = @(
            "release/electron/PaperSpark-${env:RELEASE_VERSION}-setup.exe",
            "release/electron/PaperSpark-${env:RELEASE_VERSION}-win-unpacked.zip"
          )
          foreach ($item in $required) {
            if (-not (Test-Path $item)) {
              throw "Missing expected asset: $item"
            }
          }

      - name: Upload assets to GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $assets = @(
            "release/electron/PaperSpark-${env:RELEASE_VERSION}-setup.exe",
            "release/electron/PaperSpark-${env:RELEASE_VERSION}-win-unpacked.zip"
          )
          $nsisArchive = Get-ChildItem "release/electron" -Filter "*.nsis.7z" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsisArchive) {
            $assets += $nsisArchive.FullName
          }

          gh release upload $env:RELEASE_TAG $assets --clobber

  deploy-production:
    name: Deploy to Vercel
    needs:
      - release
      - build-electron-windows
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy Production to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
