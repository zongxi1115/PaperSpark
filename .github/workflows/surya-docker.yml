name: Build and Push Surya OCR Image

on:
  push:
    branches: [main, master]
    paths:
      - "services/surya_ocr_service/**"
      - ".github/workflows/surya-docker.yml"
  workflow_dispatch:

jobs:
  docker:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[docker]')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: cpu
            torch_channel: cpu
          - tag: gpu-cu126
            torch_channel: cu126

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (${{ matrix.tag }})
        uses: docker/build-push-action@v6
        with:
          context: ./services/surya_ocr_service
          file: ./services/surya_ocr_service/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            TORCH_CHANNEL=${{ matrix.torch_channel }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/paperspark-surya:${{ matrix.tag }}
          cache-from: type=gha,scope=surya-${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=surya-${{ matrix.tag }}
