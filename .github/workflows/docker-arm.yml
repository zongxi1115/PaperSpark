name: Build and Push ARM64 Images

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
    branches: [main, master]
  workflow_dispatch:

jobs:
  nextjs-arm64:
    # Release 成功完成后自动构建，或手动触发
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Next.js arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.next
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/paperspark-nextjs:latest-arm64
          cache-from: type=gha,scope=nextjs-arm64
          cache-to: type=gha,mode=max,scope=nextjs-arm64

  surya-cpu-arm64:
    # Release 成功完成后自动构建，或手动触发
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Surya CPU arm64
        uses: docker/build-push-action@v6
        with:
          context: ./services/surya_ocr_service
          file: ./services/surya_ocr_service/Dockerfile
          push: true
          platforms: linux/arm64
          build-args: |
            TORCH_CHANNEL=cpu
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/paperspark-surya:cpu-arm64
          cache-from: type=gha,scope=surya-cpu-arm64
          cache-to: type=gha,mode=max,scope=surya-cpu-arm64
