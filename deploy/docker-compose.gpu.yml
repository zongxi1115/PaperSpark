# ============================================
# GPU 版本覆盖配置
# ============================================
#
# 使用方式：
#   docker-compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# 前提：安装 NVIDIA Container Toolkit
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#
# ============================================

services:
  surya-ocr:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USER:-xiaozongxi}/paperspark-surya:${SURYA_GPU_VERSION:-gpu-cu126}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - SURYA_MAX_WORKERS=${SURYA_MAX_WORKERS:-4}
      - SURYA_EXECUTION_BACKEND=python
      - CUDA_VISIBLE_DEVICES=all
